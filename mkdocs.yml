site_name: C# / .NET ナレッジベース
site_description: C# / .NET を環境構築から実務レベルまで段階的に学ぶためのナレッジベース
site_author: t.shirayama
site_url: https://t-shirayama.github.io/csharp-tutorial-lab/

docs_dir: docs
site_dir: site

not_in_nav: |
  _assets/*.md
  _snippets/*.md
  _templates/*.md

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  features:
    - navigation.expand
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.select

extra_css:
  - _assets/stylesheets/extra.css

extra:
    generator: false

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

