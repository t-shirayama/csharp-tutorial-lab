version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(actions)"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(python)"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(docker)"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker-compose"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(compose)"
    open-pull-requests-limit: 5
