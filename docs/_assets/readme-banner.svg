  <text x="780" y="142" class="title navy">ナレッジベース</text>
  <text x="225" y="242" class="lead teal">学習ロードマップ</text>
  <text x="575" y="242" class="lead navy">で段階的に身につく</text>

  <path d="M360 480 C548 507 648 485 774 438 C912 387 1013 390 1128 438 C1264 495 1382 492 1519 436 C1636 389 1764 399 1870 450" fill="none" stroke="url(#tealBlue)" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <circle cx="610" cy="486" r="22" fill="#ffffff" stroke="#00a99d" stroke-width="10"/>
  <circle cx="1195" cy="472" r="22" fill="#ffffff" stroke="#42a5f5" stroke-width="10"/>
  <circle cx="1710" cy="472" r="22" fill="#ffffff" stroke="#00a99d" stroke-width="10"/>

