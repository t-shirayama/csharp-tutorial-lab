    <text x="490" y="0" class="caption muted">|</text>
    <text x="555" y="0" class="caption blue">&lt;/&gt;</text>
    <text x="625" y="0" class="caption muted">サンプルコード付き</text>
    <text x="1040" y="0" class="caption muted">|</text>
    <circle cx="1120" cy="-10" r="24" fill="none" stroke="#00a99d" stroke-width="6"/>
    <path d="M1108 -10 L1118 2 L1135 -18" fill="none" stroke="#00a99d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1165" y="0" class="caption muted">実務に役立つ内容</text>
    <text x="1535" y="0" class="caption muted">|</text>
    <path d="M1610 12 V-18 H1630 V12 Z M1642 12 V-36 H1662 V12 Z M1674 12 V-56 H1694 V12 Z" fill="#42a5f5"/>
    <text x="1725" y="0" class="caption muted">継続的にアップデート</text>
