<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="620" viewBox="0 0 2400 620" role="img" aria-labelledby="title desc">
  <title id="title">C# / .NET ナレッジベース</title>
  <desc id="desc">基礎編、実務編、応用・発展編の3段階でC#と.NETを学ぶロードマップを示すREADMEバナー。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fcfd"/>
      <stop offset="0.48" stop-color="#eef9fb"/>
      <stop offset="1" stop-color="#dff4f8"/>
    </linearGradient>
    <linearGradient id="tealBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00a99d"/>
      <stop offset="1" stop-color="#42a5f5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#156c78" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 90px "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; }
      .lead { font: 700 38px "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; }
      .card-title { font: 800 30px "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; }
      .body { font: 600 22px "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; }
      .caption { font: 700 21px "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; }
      .navy { fill: #24435f; }
      .teal { fill: #00a99d; }
      .blue { fill: #42a5f5; }
      .muted { fill: #456176; }
    </style>
  </defs>

  <rect width="2400" height="620" fill="url(#bg)"/>
  <path d="M0 278 C230 260 296 372 507 377 C765 383 789 298 1034 323 C1275 348 1280 420 1512 404 C1772 385 1760 226 2065 164 C2195 137 2297 148 2400 175 L2400 620 L0 620 Z" fill="#d9f3f7" opacity="0.62"/>
  <path d="M0 455 C265 472 420 534 664 496 C875 463 911 400 1102 439 C1322 484 1343 520 1552 483 C1765 446 1810 490 1975 510 C2135 530 2262 503 2400 466 L2400 620 L0 620 Z" fill="#c7eef4" opacity="0.58"/>

